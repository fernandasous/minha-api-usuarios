<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estudo de API - Cadastro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 500px; margin: 40px auto; background: #f4f7f6; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #357abd; }
        .user-item { background: #fafafa; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 4px solid #4a90e2; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>Inserir Usuário</h2>
    <form id="formUser">
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="number" id="idade" placeholder="Idade" required>
        <button type="submit">Cadastrar na Database</button>
    </form>

    <h2>Usuários na Database</h2>
    <div id="lista"></div>

    <button type="button" id="btnDelete">Deletar da Database</button>
</div>

<div id="alert" style="display:block; margin-top: 20px; padding: 15px; background-color: #f44336; color: white; border-radius: 5px;"></div>

<script src = "script.js"></script>

</body>
</html>
