<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estudo de API - Cadastro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 500px; margin: 40px auto; background: #f4f7f6; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #357abd; }
        .user-item { background: #fafafa; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 4px solid #4a90e2; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>Inserir Usuário</h2>
    <form id="formUser">
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="number" id="idade" placeholder="Idade" required>
        <button type="submit">Cadastrar na Database</button>
    </form>

    <h2>Usuários na Database</h2>
    <div id="lista"></div>

    <button type="button" id="btnDelete">Deletar da Database</button>
</div>

<script>
    const API_URL = "/users"; 

    async function carregar() {
        try {
            const res = await fetch(API_URL);
            const dados = await res.json();
            console.log("Dados recebidos:", dados);
            const lista = document.getElementById('lista');
            lista.innerHTML = dados.map(u => `
                <div class="user-item">
                    <input type="checkbox" class="user-selector" value="${u.id}">
                    <strong>${u.nome}</strong>, ${u.idade} anos
                </div>
            `).join('');
        } catch (err) {
            console.error("Erro ao carregar:", err);
        }
    }

    // Função para inserir usuário
    document.getElementById('formUser').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('nome').value;
        const idade = parseInt(document.getElementById('idade').value);

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome, idade })
        });

        document.getElementById('formUser').reset();
        carregar();
    });

    document.getElementById('btnDelete').addEventListener('click', async () => {
        const selected = document.querySelectorAll('.user-selector:checked');

        if (selected.length === 0) {
            alert ("Selecione ao menos um registro para excluir.");
            return;
        }

        for (let cb of selected) {
            const id = cb.value;
            const token = localStorage.getItem(`token_user_${id}`);

            await fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
        }

        carregar();
    });
</script>

</body>
</html>
